<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Inventaris - GudangDigital</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">📦 GudangDigital</h1>
        <div class="flex items-center gap-4">
            <div class="text-sm">
                <span class="font-semibold text-blue-200">Masuk Sebagai:</span>
                <span id="user-email-display" class="font-bold bg-blue-700 px-2 py-1 rounded ml-1">Memuat...</span>
                <span id="user-role-display" class="font-extrabold bg-yellow-500 text-black px-2 py-0.5 rounded text-xs ml-1">OWNER</span>
            </div>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded transition">
                🚪 Keluar
            </button>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div id="adminForm" class="bg-white p-6 rounded-lg shadow-md mb-6">
            <h2 class="text-lg font-bold mb-4 text-blue-600">Tambah Barang Baru (Owner & Admin Access)</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="pName" placeholder="Nama Barang" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="pSku" placeholder="SKU / Kode" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="pStock" placeholder="Stok Awal" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="pLocation" placeholder="Lokasi (Contoh: Rak A)" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="addProduct()" class="mt-4 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 font-semibold transition">Simpan Barang</button>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-lg font-bold mb-4 text-gray-800">Daftar Stok Barang</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-200 text-gray-700">
                            <th class="p-3 border">SKU</th>
                            <th class="p-3 border">Nama Barang</th>
                            <th class="p-3 border">Stok</th>
                            <th class="p-3 border">Lokasi</th>
                            <th class="p-3 border">Aksi Karyawan / Admin</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable">
                        <tr><td colspan="5" class="p-4 text-center text-gray-500">Memuat data barang...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="stockModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
        <div class="bg-white p-6 rounded-lg shadow-lg w-96">
            <h3 id="modalTitle" class="text-lg font-bold mb-4 text-gray-800">Update Stok</h3>
            <input type="hidden" id="modalProductId">
            <div class="mb-4">
                <label class="block mb-1 font-medium text-sm text-gray-600">Jenis Transaksi</label>
                <select id="transactionType" class="w-full border p-2 rounded">
                    <option value="IN">Barang Masuk (+)</option>
                    <option value="OUT">Barang Keluar (-)</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block mb-1 font-medium text-sm text-gray-600">Jumlah</label>
                <input type="number" id="transQuantity" class="w-full border p-2 rounded" min="1">
            </div>
            <div class="mb-4">
                <label class="block mb-1 font-medium text-sm text-gray-600">Nama Operator</label>
                <input type="text" id="transOperator" class="w-full border p-2 rounded" placeholder="Nama Anda" readonly>
            </div>
            <div class="flex justify-end gap-2">
                <button onclick="closeModal()" class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500 transition">Batal</button>
                <button onclick="submitStockUpdate()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Proses</button>
            </div>
        </div>
    </div>

    <script>
        // Kredensial Resmi Supabase Pusat Anda
        const SUPABASE_URL = "https://kghjkyeksacozjuabiqe.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnaGpreWVrc2Fjb3pqdWFiaXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODY5MDksImV4cCI6MjA5NTI2MjkwOX0.khICdbLlwuTurpDoBwelzEhQCLrA04W4yx00dkFDhAw";

        // ========================================================
        // 🛡️ SECURITY GUARD: SYSTEM SESSION AUTO-EXPIRY FOR CLOSED TABS
        // ========================================================
        // Jika dideteksi ada data login baru dari localStorage, pindahkan langsung ke sessionStorage
        if (localStorage.getItem('supabase.auth.token')) {
            sessionStorage.setItem('supabase.auth.token', localStorage.getItem('supabase.auth.token'));
            sessionStorage.setItem('user_email', localStorage.getItem('user_email'));
            sessionStorage.setItem('user_role', localStorage.getItem('user_role'));
            
            // Hapus dari localStorage agar tidak mengendap selamanya di browser
            localStorage.clear();
        }

        // Ambil data session aktif dari sessionStorage (Otomatis hangus saat tab web ditutup)
        const sessionToken = sessionStorage.getItem('supabase.auth.token');
        const savedEmail = sessionStorage.getItem('user_email');
        const savedRole = sessionStorage.getItem('user_role');

        // Jika tidak ada token aktif, tendang langsung secara paksa ke form login
        if (!sessionToken) {
            window.location.href = 'login.html';
        }
        // ========================================================

        // 2. JALANKAN LOGIKA SETELAH HALAMAN SELESAI DIMUAT
        document.addEventListener('DOMContentLoaded', () => {
            const emailDisplay = document.getElementById('user-email-display');
            if (emailDisplay) {
                emailDisplay.textContent = savedEmail || 'User Gudang';
            }

            // ========================================================
            // LOGIKA VALIDASI & PEWARNAAN 3 ENTITAS (ROLE)
            // ========================================================
            const roleDisplay = document.getElementById('user-role-display');
            const adminFormBlock = document.getElementById('adminForm');

            if (roleDisplay) {
                const currentRole = savedRole ? savedRole.toUpperCase() : 'KARYAWAN';
                roleDisplay.textContent = currentRole;

                if (currentRole === 'OWNER') {
                    roleDisplay.className = "font-extrabold bg-yellow-500 text-black px-2 py-0.5 rounded text-xs ml-1";
                } else if (currentRole === 'ADMIN') {
                    roleDisplay.className = "font-extrabold bg-sky-400 text-white px-2 py-0.5 rounded text-xs ml-1";
                } else {
                    roleDisplay.className = "font-extrabold bg-green-500 text-white px-2 py-0.5 rounded text-xs ml-1";
                    
                    if (adminFormBlock) {
                        adminFormBlock.classList.add('hidden');
                    }
                }
            }

            const transOperatorInput = document.getElementById('transOperator');
            if (transOperatorInput) {
                transOperatorInput.value = savedEmail || 'Operator';
            }

            fetchProducts();
        });

        // 3. FUNGSI LOGOUT TOTAL
        function logout() {
            localStorage.clear();
            sessionStorage.clear();
            alert("Anda telah keluar dari sistem.");
            window.location.href = 'login.html';
        }

        // 4. FUNGSI AMBIL DATA BARANG
        async function fetchProducts() {
            try {
                const response = await axios.get(`${SUPABASE_URL}/rest/v1/products?select=*`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                const products = response.data;
                const tableBody = document.getElementById('inventoryTable');
                tableBody.innerHTML = '';

                if (!products || products.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-500">Belum ada stok barang terdaftar. Silakan tambahkan di atas!</td></tr>`;
                    return;
                }

                products.sort((a, b) => a.id - b.id);

                products.forEach(p => {
                    tableBody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="p-3 border font-mono text-sm text-gray-700">${p.sku}</td>
                            <td class="p-3 border font-semibold text-gray-800">${p.name}</td>
                            <td class="p-3 border ${p.stock < 10 ? 'text-red-600 font-bold bg-red-50' : 'text-gray-800'}">${p.stock} pcs</td>
                            <td class="p-3 border text-sm text-gray-600">${p.location || '-'}</td>
                            <td class="p-3 border">
                                <button onclick="openModal(${p.id}, '${p.name}')" class="bg-blue-500 hover:bg-blue-600 text-white text-xs px-3 py-1.5 rounded font-medium shadow-sm transition">
                                    ± Update Stok
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Gagal memuat data barang:", err);
                const tableBody = document.getElementById('inventoryTable');
                tableBody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-500 font-medium">Gagal memuat data dari database. Periksa konfigurasi RLS Supabase Anda.</td></tr>`;
            }
        }

        // 5. FUNGSI SIMPAN BARANG BARU
        async function addProduct() {
            const name = document.getElementById('pName').value.trim();
            const sku = document.getElementById('pSku').value.trim();
            const stock = parseInt(document.getElementById('pStock').value) || 0;
            const location = document.getElementById('pLocation').value.trim();

            if(!name || !sku) return alert('Nama Barang dan SKU wajib diisi!');

            try {
                await axios.post(`${SUPABASE_URL}/rest/v1/products`, 
                { name, sku, stock, location },
                {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    }
                });

                alert('Barang baru berhasil disimpan ke gudang digital!');
                
                document.getElementById('pName').value = '';
                document.getElementById('pSku').value = '';
                document.getElementById('pStock').value = '';
                document.getElementById('pLocation').value = '';
                
                fetchProducts(); 
            } catch (err) {
                console.error(err);
                alert('Gagal menambah barang baru. Pastikan opsi RLS pada tabel products di dasbor Supabase Anda sudah dinonaktifkan.');
            }
        }

        // 6. KONTROL MODAL BOX POPUP
        function openModal(id, name) {
            document.getElementById('modalProductId').value = id;
            document.getElementById('modalTitle').innerText = `Update Stok: ${name}`;
            document.getElementById('stockModal').classList.remove('hidden');
        }

        // 7. SINKRONISASI TUTUP MODAL
        function closeModal() {
            document.getElementById('stockModal').classList.add('hidden');
            document.getElementById('transQuantity').value = '';
        }

        // 8. PROSES UPDATE JUMLAH STOK BARANG
        async function submitStockUpdate() {
            const id = document.getElementById('modalProductId').value;
            const type = document.getElementById('transactionType').value;
            const quantity = parseInt(document.getElementById('transQuantity').value) || 0;

            if(!quantity || quantity <= 0) return alert('Jumlah stok tidak boleh kosong atau bernilai 0!');

            try {
                const getProduct = await axios.get(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                
                let currentStock = getProduct.data[0].stock;
                let newStock = type === 'IN' ? currentStock + quantity : currentStock - quantity;

                if (newStock < 0) return alert('Gagal! Stok gudang tidak boleh minus.');

                await axios.patch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, 
                { stock: newStock },
                {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                alert('Stok barang berhasil diperbarui!');
                closeModal();
                fetchProducts();
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan sistem saat memproses kalkulasi update stok.');
            }
        }
    </script>
</body>
</html>
