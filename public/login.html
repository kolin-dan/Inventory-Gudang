<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GudangDigital</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 id="formTitle" class="text-2xl font-bold text-center text-blue-600 mb-6">Login GudangDigital</h2>
    
    <form id="authForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" required class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="nama@email.com">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="password" required class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="••••••••">
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 font-semibold transition mt-6">
        Masuk
      </button>
    </form>
  </div>

  <script>
    const authForm = document.getElementById('authForm');

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const SUPABASE_URL = "https://kghjkyeksacozjuabiqe.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnaGpreWVrc2Fjb3pqdWFiaXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODY5MDksImV4cCI6MjA5NTI2MjkwOX0.khICdbLlwuTurpDoBwelzEhQCLrA04W4yx00dkFDhAw";
        const supabaseEndpoint = `${SUPABASE_URL}/auth/v1/token?grant_type=password`;

        const response = await fetch(supabaseEndpoint, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            },
            body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (!response.ok) {
            alert('Error Login: ' + (result.error_description || result.error || 'Email atau password salah.'));
            return;
        }

        if (result.access_token) {
            const userEmail = result.user.email;
            let userRole = 'karyawan';

            try {
                const profileResponse = await fetch(`${SUPABASE_URL}/rest/v1/profiles?email=eq.${userEmail}`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (profileResponse.ok) {
                    const profileData = await profileResponse.json();
                    if (profileData && profileData.length > 0) {
                        userRole = (profileData[0].role || profileData[0].status || 'karyawan').toLowerCase();
                    }
                }
            } catch (profileErr) {
                console.error("Gagal mengambil data profile role:", profileErr);
            }

            localStorage.setItem('supabase.auth.token', result.access_token);
            localStorage.setItem('user_email', userEmail);
            localStorage.setItem('user_role', userRole); 
            
            // 🛡️ TRICK AMPUH: Matikan paksa fungsi alert browser agar script gaib dari Supabase/Vercel tidak bisa muncul
            window.alert = function() {}; 
            
            // Langsung lempar ke halaman utama secara instan
            window.location.href = 'index.html';
        }

      } catch (err) {
        console.error(err);
        alert('Terjadi kesalahan koneksi sistem langsung ke server Supabase.');
      }
    });
  </script>
</body>
</html>
